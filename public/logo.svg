<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E8F4F8" stroke="#1e40af" stroke-width="2"/>
  
  <!-- House shape -->
  <path d="M 100 40 L 160 90 L 150 90 L 150 150 L 50 150 L 50 90 L 40 90 Z" 
        fill="none" stroke="#1e40af" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Roof highlight -->
  <path d="M 60 100 L 100 50 L 140 100" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Door -->
  <rect x="88" y="115" width="24" height="35" fill="#3b82f6" rx="3"/>
  <circle cx="110" cy="132" r="2" fill="#E8F4F8"/>
  
  <!-- Window -->
  <rect x="60" y="105" width="16" height="16" fill="#3b82f6" rx="2"/>
  <line x1="68" y1="105" x2="68" y2="121" stroke="#E8F4F8" stroke-width="1"/>
  <line x1="60" y1="113" x2="76" y2="113" stroke="#E8F4F8" stroke-width="1"/>
  
  <!-- Search symbol (magnifying glass) -->
  <circle cx="155" cy="155" r="18" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <line x1="168" y1="168" x2="180" y2="180" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
</svg>